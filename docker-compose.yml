services:
  postgres:
    image: postgres:16-alpine
    container_name: kiddie_chic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kiddie_chic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kc_user} -d ${POSTGRES_DB:-kiddie_chic}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
